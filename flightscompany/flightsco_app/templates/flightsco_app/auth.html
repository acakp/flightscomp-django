{% extends "flightsco_app/base.html" %}
{% load static %}

{% block title %}Вход - Дешёвые авиабилеты{% endblock %}

{% block content %}
<main class="auth-section" style="padding: 120px 20px 80px; background: #f8f8f8; min-height: 100vh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card feature-card p-4">
          <div class="text-center mb-4">
            <h2 class="mb-3">Вход в аккаунт</h2>
            <p class="text-muted">Введите свои данные для входа</p>
          </div>

          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control p-3" id="email" name="email" placeholder="your@email.com" required>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Пароль</label>
              <input type="password" class="form-control p-3" id="password" name="password" placeholder="Введите пароль" required>
            </div>

            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="remember" name="remember">
              <label class="form-check-label" for="remember">Запомнить меня</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 p-3 mb-3">Войти</button>

            <div class="text-center">
              <a href="#" class="text-decoration-none">Забыли пароль?</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock %}
